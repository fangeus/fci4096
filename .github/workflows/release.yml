name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify version consistency
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION, tag=$TAG_VERSION"
            exit 1
          fi
          echo "Version $CARGO_VERSION verified"

      - name: Run tests
        run: cargo test --all-features

      - name: Check clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Verify package contents
        run: |
          cargo package --list
          cargo package --list | grep -q "data/four_chinese_idiom.txt" || {
            echo "::error::Missing required file: data/four_chinese_idiom.txt"
            exit 1
          }

      - name: Dry-run publish
        run: cargo publish --dry-run

  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          # Extract the section between this version header and the next version header
          CHANGELOG=$(awk -v ver="$VERSION" '
            BEGIN { found=0; output="" }
            /^## \[/ {
              if (found) exit
              if ($0 ~ "## \\[" ver "\\]") found=1
              next
            }
            found { output = output $0 "\n" }
            END { print output }
          ' CHANGELOG.md)
          # Use a heredoc-safe approach with a delimiter
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          generate_release_notes: true